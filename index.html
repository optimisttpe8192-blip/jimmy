<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="吉米記帳">
<meta name="theme-color" content="#1d6ded">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<title>吉米記帳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--bg:#f5f3ef;--surface:#fff;--surface2:#f0ede8;--border:#e8e4dd;--text:#1a1814;--text2:#8a8278;--text3:#bbb5ad;--accent:#1d6ded;--accent-light:#e8f0fe;--red:#e63946;--red-light:#fdecea;--radius:18px;--radius-sm:12px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:15px;overflow:hidden;}
#login-screen{position:fixed;inset:0;background:var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:20px;}
#login-screen .logo{width:100px;height:100px;border-radius:24px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:900;color:#fff;}
#login-screen h2{color:#fff;font-size:24px;font-weight:900;}
#login-screen p{color:rgba(255,255,255,0.7);font-size:14px;}
.login-btn{padding:16px 32px;background:#fff;color:var(--accent);border:none;border-radius:var(--radius);font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,0.15);}
.login-btn img{width:20px;height:20px;}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:100;}
nav button{flex:1;padding:12px 8px 10px;background:none;border:none;color:var(--text3);font-size:11px;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:color 0.2s;}
nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;}
nav button.active{color:var(--accent);}
.page{display:none;min-height:100vh;padding-bottom:80px;}
.page.active{display:flex;flex-direction:column;}
#page-stats.active,#page-records.active{overflow-y:auto;height:100vh;}
#page-add.active{height:100vh;height:100dvh;max-height:100dvh;}
.qa-hero{flex:1;display:flex;flex-direction:column;min-height:0;}
.qa-type-btns{display:flex;flex-direction:column;flex:1;}
.qa-type-btn{flex:1;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-family:inherit;font-size:22px;font-weight:900;color:#fff;}
.qa-type-btn.expense{background:#1565c0;}
.qa-type-btn.income{background:#26a69a;}
.qa-type-btn span{font-size:44px;}
#top-bar{background:#fff;padding:12px 16px;text-align:center;color:#bbb5ad;font-size:14px;font-weight:700;letter-spacing:0.05em;border-bottom:1px solid var(--border);}
.qa-body{flex:1;padding:28px 20px 0;display:flex;flex-direction:column;justify-content:flex-start;}
.qa-options{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}
.qa-btn{padding:18px 20px;background:var(--surface);border:1.5px solid var(--border);border-radius:18px;font-size:17px;font-weight:700;font-family:inherit;color:var(--text);text-align:left;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.15s;}
.qa-btn:active{transform:scale(0.98);}
.qa-btn.accent{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.qa-btn.red{border-color:var(--red);color:var(--red);background:var(--red-light);}
.qa-btn-icon{font-size:24px;flex-shrink:0;}
.qa-input-wrap{margin-bottom:20px;}
.qa-input{width:100%;padding:18px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);font-size:22px;font-family:inherit;font-weight:700;color:var(--text);outline:none;transition:border-color 0.2s;}
.qa-input:focus{border-color:var(--accent);}
.qa-next{width:100%;padding:18px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 16px rgba(29,109,237,0.3);}
.qa-back{background:none;border:none;color:var(--text3);font-size:14px;font-family:inherit;cursor:pointer;padding:14px 0;display:block;text-align:center;width:100%;}
.qa-reset{background:none;border:none;color:rgba(255,255,255,0.6);font-size:13px;font-family:inherit;cursor:pointer;padding:4px 0;}
.qa-summary{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px;}
.qa-summary-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;}
.qa-summary-row:last-child{border-bottom:none;}
.qa-summary-row .k{color:var(--text2);}
.qa-summary-row .v{font-weight:700;}
.inner-page{padding:24px 16px 0;}
.page-header{margin-bottom:20px;}
.page-header h1{font-size:28px;font-weight:900;}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.summary-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;}
.summary-card.full{grid-column:1/-1;}
.summary-card .s-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.summary-card .s-amount{font-size:24px;font-weight:900;font-family:'DM Mono',monospace;}
.s-amount.income{color:#1db954;}
.s-amount.expense{color:var(--red);}
.chart-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px;}
.chart-wrap h3{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:14px;font-weight:500;}
.chart-container{position:relative;height:200px;}
.section-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.cat-item{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);}
.cat-item:last-child{border-bottom:none;}
.cat-dot{width:10px;height:10px;border-radius:50%;margin-right:12px;flex-shrink:0;}
.cat-name{flex:1;font-size:14px;}
.cat-bar-wrap{width:70px;height:4px;background:var(--surface2);border-radius:2px;margin:0 12px;}
.cat-bar{height:100%;border-radius:2px;}
.cat-amount{font-family:'DM Mono',monospace;font-size:13px;color:var(--text2);min-width:58px;text-align:right;}
.record-item{display:flex;align-items:center;padding:13px 0;border-bottom:1px solid var(--border);}
.record-item:last-child{border-bottom:none;}
.record-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-right:12px;flex-shrink:0;}
.record-icon.expense{background:var(--red-light);}
.record-icon.income{background:var(--accent-light);}
.record-info{flex:1;min-width:0;}
.record-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.record-meta{font-size:12px;color:var(--text2);margin-top:2px;}
.record-amount{font-family:'DM Mono',monospace;font-size:15px;font-weight:700;}
.record-amount.expense{color:var(--red);}
.record-amount.income{color:#1db954;}
.month-sel{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.month-sel button{background:var(--surface);border:1.5px solid var(--border);color:var(--text);padding:8px 14px;border-radius:var(--radius-sm);font-size:16px;cursor:pointer;font-family:inherit;font-weight:700;}
.month-sel span{flex:1;text-align:center;font-weight:900;font-size:17px;}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;}
#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:500;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:200;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.np-btn{padding:18px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:22px;font-weight:700;font-family:"DM Mono",monospace;color:var(--text);cursor:pointer;text-align:center;}
.np-btn.del{color:var(--red);}
.np-btn.ok{background:var(--accent);color:#fff;border-color:var(--accent);}
.price-display{width:100%;padding:18px 16px;background:var(--surface);border:1.5px solid var(--accent);border-radius:var(--radius);font-size:36px;font-family:"DM Mono",monospace;font-weight:900;color:var(--text);text-align:right;margin-bottom:16px;min-height:72px;display:flex;align-items:center;justify-content:flex-end;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:500px;padding:24px 20px 40px;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:18px;font-weight:900;margin-bottom:20px;}
.modal-field{margin-bottom:14px;}
.modal-field label{display:block;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.modal-field input,.modal-field select{width:100%;padding:13px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;font-family:inherit;appearance:none;outline:none;}
.modal-field input:focus,.modal-field select:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:10px;margin-top:20px;}
.modal-save{flex:1;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;}
.modal-delete{padding:14px 20px;background:var(--red-light);color:var(--red);border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;}
.status-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.status-badge.未開始{background:#f0ede8;color:#8a8278;}
.status-badge.進行中{background:#fff3cd;color:#b45309;}
.status-badge.已完成{background:#d1fae5;color:#065f46;}
#app-root{display:none;}
</style>
</head>
<body>

<!-- 登入畫面 -->
<div id="login-screen">
  <div class="logo">吉米</div>
  <h2>吉米記帳</h2>
  <p>請登入以儲存你的記帳資料</p>
  <p id="login-debug" style="color:rgba(255,255,255,0.6);font-size:12px;min-height:16px;"></p>
  <button class="login-btn" id="google-login-btn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    用 Google 帳號登入
  </button>
</div>

<!-- 主 App -->
<div id="app-root">

<div class="page active" id="page-add">
  <div id="top-bar">林遠均超帥</div>
  <div class="qa-hero" id="qa-hero">
    <div class="qa-type-btns">
      <button class="qa-type-btn expense" id="btn-expense"><span>💸</span>支出</button>
      <button class="qa-type-btn income" id="btn-income"><span>💰</span>收入</button>
    </div>
  </div>
  <div class="qa-body" id="qa-body"></div>
</div>

<div class="page" id="page-stats">
  <div class="inner-page">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;"><h1>分析</h1><button onclick="openCatManager()" style="background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;font-weight:700;font-family:inherit;color:var(--text2);cursor:pointer;">⚙️ 分類</button></div>
    <div class="month-sel">
      <button id="stats-prev">&#8249;</button>
      <span id="stats-month-label" style="cursor:pointer;text-decoration:underline dotted;text-underline-offset:4px;" onclick="openMonthPicker('stats')"></span>
      <button id="stats-next">&#8250;</button>
    </div>
    <div class="summary-grid">
      <div class="summary-card"><div class="s-label">已到帳</div><div class="s-amount income" id="stat-income">$0</div></div>
      <div class="summary-card"><div class="s-label">預計總收入</div><div class="s-amount" id="stat-income-pending" style="color:#b45309;">$0</div></div>
      <div class="summary-card"><div class="s-label">支出</div><div class="s-amount expense" id="stat-expense">$0</div></div>
      <div class="summary-card"><div class="s-label">結餘（已到帳 - 支出）</div><div class="s-amount" id="stat-balance">$0</div></div>
      <div class="summary-card"><div class="s-label">儲蓄率</div><div class="s-amount" id="stat-savings-rate" style="color:#1d6ded;">-</div></div>
    </div>
    <div class="chart-wrap"><h3>支出分類</h3><div class="chart-container"><canvas id="cat-chart"></canvas></div></div>
    <div class="section-card"><div id="cat-list"></div></div>
    <div class="chart-wrap" id="income-chart-wrap" style="display:none"><h3>收入來源</h3><div class="chart-container"><canvas id="income-chart"></canvas></div></div>
    <div class="section-card" id="income-list-card" style="display:none"><div id="income-list"></div></div>
  </div>
</div>

<div class="page" id="page-records">
  <div class="inner-page">
    <div class="page-header"><h1>紀錄</h1></div>
    <div class="month-sel">
      <button id="rec-prev">&#8249;</button>
      <span id="rec-month-label" style="cursor:pointer;text-decoration:underline dotted;text-underline-offset:4px;" onclick="openMonthPicker('records')"></span>
      <button id="rec-next">&#8250;</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button id="tab-expense" onclick="switchRecTab('expense')" style="flex:1;padding:10px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:inherit;border:none;cursor:pointer;background:#1565c0;color:#fff;">支出</button>
      <button id="tab-income" onclick="switchRecTab('income')" style="flex:1;padding:10px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:inherit;border:1.5px solid var(--border);cursor:pointer;background:var(--surface);color:var(--text2);">收入</button>
    </div>
    <div class="section-card" id="records-list"></div>
  </div>
</div>

<nav>
  <button class="active" id="nav-add">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    記帳
  </button>
  <button id="nav-stats">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    分析
  </button>
  <button id="nav-records">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    紀錄
  </button>
</nav>
<div id="toast"></div>

<div class="modal-overlay" id="edit-overlay">
  <div class="modal">
    <div class="modal-title">編輯紀錄</div>
    <div class="modal-field"><label>日期</label><input type="date" id="edit-date"></div>
    <div class="modal-field"><label>項目</label><input type="text" id="edit-item"></div>
    <div class="modal-field"><label>金額</label><input type="number" id="edit-price" inputmode="numeric"></div>
    <div class="modal-field" id="edit-status-wrap"><label>款項狀態</label>
      <select id="edit-status">
        <option>未開始</option><option>進行中</option><option>已完成</option>
      </select>
    </div>
    <div class="modal-field" id="edit-cat-wrap"><label>分類</label>
      <select id="edit-cat">
        <option>飲食</option><option>交通</option><option>購物</option>
        <option>玩樂</option><option>日常用品</option><option>固定支出</option>
      </select>
    </div>
    <div class="modal-field" id="edit-method-wrap"><label>方式</label>
      <select id="edit-method">
        <option>現金</option><option>信用卡</option><option>Line pay</option><option>轉帳</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="modal-delete" id="delete-btn">刪除</button>
      <button class="modal-save" id="save-btn">儲存</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="cat-manager-overlay">
  <div class="modal">
    <div class="modal-title">管理分類</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button id="cat-tab-expense" onclick="switchCatTab('expense')" style="flex:1;padding:8px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:inherit;border:none;cursor:pointer;background:#1565c0;color:#fff;">支出</button>
      <button id="cat-tab-income" onclick="switchCatTab('income')" style="flex:1;padding:8px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:inherit;border:1.5px solid var(--border);cursor:pointer;background:var(--surface);color:var(--text2);">收入</button>
    </div>
    <div id="cat-list-manage" style="margin-bottom:16px;"></div>
    <div style="display:flex;gap:8px;">
      <input id="cat-new-input" type="text" placeholder="新增分類名稱" style="flex:1;padding:12px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;outline:none;">
      <button onclick="addCategory()" style="padding:12px 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;">新增</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="month-picker-overlay">
  <div class="modal">
    <div class="modal-title">選擇月份</div>
    <div style="display:flex;gap:10px;margin-bottom:20px;">
      <div class="modal-field" style="flex:1;margin:0;"><label>年</label><select id="picker-year"></select></div>
      <div class="modal-field" style="flex:1;margin:0;"><label>月</label><select id="picker-month"></select></div>
    </div>
    <button class="modal-save" id="picker-confirm">確認</button>
  </div>
</div>
</div><!-- end app-root -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWEE3qf8ueNYtqK2M2PqkfnoUTZwO8Xhg",
  authDomain: "jimmy-f75be.firebaseapp.com",
  projectId: "jimmy-f75be",
  storageBucket: "jimmy-f75be.firebasestorage.app",
  messagingSenderId: "284949161292",
  appId: "1:284949161292:web:8e9a8d2d328d3e4a34dbe9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let currentUser = null;

// 登入按鈕 - popup 優先，失敗改 redirect
document.getElementById("google-login-btn").addEventListener("click", async function(){
  const provider = new GoogleAuthProvider();
  provider.setCustomParameters({prompt: "select_account"});
  const btn = this;
  btn.disabled = true;
  btn.textContent = "登入中...";
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    console.log("popup failed:", e.code);
    if(e.code === "auth/popup-blocked" || e.code === "auth/popup-closed-by-user" || e.code === "auth/cancelled-popup-request"){
      try {
        await signInWithRedirect(auth, provider);
      } catch(e2) {
        console.error("redirect also failed:", e2);
        document.getElementById("login-debug").textContent = "登入失敗: " + e2.code;
        btn.disabled = false;
        btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:20px;height:20px;"> 用 Google 帳號登入';
      }
    } else {
      console.error("login error:", e.code, e.message);
      document.getElementById("login-debug").textContent = "錯誤: " + e.code;
      btn.disabled = false;
      btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:20px;height:20px;"> 用 Google 帳號登入';
    }
  }
});

// 處理 redirect 回來的結果
getRedirectResult(auth).then(function(result){
  if(result && result.user){ 
    console.log("redirect login OK:", result.user.email);
  } else {
    console.log("getRedirectResult: no result");
  }

// 監聽登入狀態
onAuthStateChanged(auth, async function(user){
  console.log("onAuthStateChanged:", user ? user.email : "null");
  currentUser = user;
  if(user){
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app-root").style.display = "block";
    await loadFromFirestore();
    // 通知主程式可以初始化
    window._firebaseReady = true;
    if(window._onFirebaseReady) window._onFirebaseReady();
  } else {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app-root").style.display = "none";
    window._firebaseReady = false;
  }
});

// 從 Firestore 載入
async function loadFromFirestore(){
  if(!currentUser) return;
  try {
    const q = query(collection(db, "records"), where("uid", "==", currentUser.uid));
    const snap = await getDocs(q);
    const records = [];
    snap.forEach(function(d){ records.push(d.data()); });
    localStorage.setItem("jimmy_records", JSON.stringify(records));
  } catch(e){ console.error("載入失敗", e); }
}

// 儲存到 Firestore
window.saveToFirestore = async function(record){
  if(!currentUser) return;
  try {
    record.uid = currentUser.uid;
    await setDoc(doc(db, "records", String(record.id)), record);
  } catch(e){ console.error("儲存失敗", e); }
};

// 刪除 Firestore
window.deleteFromFirestore = async function(id){
  if(!currentUser) return;
  try {
    await deleteDoc(doc(db, "records", String(id)));
  } catch(e){ console.error("刪除失敗", e); }
};

  var records=getData().filter(function(r){return getYM(r.date)===ym && r.type===recTab;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  var el=document.getElementById("records-list");
  if(!records.length){el.innerHTML="<div class=\"empty\">本月無紀錄</div>";return;}
  el.innerHTML="";
  records.forEach(function(r){
    var item=document.createElement("div"); item.className="record-item"; item.style.cursor="pointer";
    (function(rid){item.addEventListener("click",function(){openEditModal(rid);});})(r.id);
    var icon=document.createElement("div"); icon.className="record-icon "+r.type; icon.textContent=CAT_ICONS[r.category]||"📌";
    var info=document.createElement("div"); info.className="record-info";
    var name=document.createElement("div"); name.className="record-name"; name.textContent=r.item;
    var meta=document.createElement("div"); meta.className="record-meta";
    var metaText=(r.date_end?r.date+" ~ "+r.date_end:r.date)+(r.category?" · "+r.category:"");
    if(r.type==="income" && r.status){
      meta.innerHTML=metaText+' <span class="status-badge '+r.status+'">'+r.status+'</span>';
    } else {
      meta.textContent=metaText+(r.note?" · "+r.note:"");
    }
    info.appendChild(name);info.appendChild(meta);
    var amt=document.createElement("div"); amt.className="record-amount "+r.type; amt.textContent=(r.type==="expense"?"-":"+")+fmtMoney(r.price);
    item.appendChild(icon);item.appendChild(info);item.appendChild(amt);
    el.appendChild(item);
  });
}

var editingId=null;
function openEditModal(id){
  var r=getData().find(function(x){return x.id===id;});
  if(!r) return;
  editingId=id;
  document.getElementById("edit-date").value=r.date||"";
  document.getElementById("edit-item").value=r.item||"";
  document.getElementById("edit-price").value=r.price||0;
  var catWrap=document.getElementById("edit-cat-wrap"), methodWrap=document.getElementById("edit-method-wrap");
  var statusWrap=document.getElementById("edit-status-wrap");
  if(r.type==="income"){
    statusWrap.style.display="block";
    document.getElementById("edit-status").value=r.status||"未開始";
    methodWrap.style.display="none";
    catWrap.style.display="block";
    var catSel=document.getElementById("edit-cat"); catSel.innerHTML="";
    getIncomeCats().forEach(function(c){var o=document.createElement("option");o.value=c;o.textContent=c;catSel.appendChild(o);});
    catSel.value=r.category||getIncomeCats()[0];
  } else {
    statusWrap.style.display="none";
    catWrap.style.display="block"; methodWrap.style.display="block";
    var catSel=document.getElementById("edit-cat"); catSel.innerHTML="";
    var eCats=r.type==="income"?getIncomeCats():getExpenseCats();
    eCats.forEach(function(c){var o=document.createElement("option");o.value=c;o.textContent=c;catSel.appendChild(o);});
    catSel.value=r.category||eCats[0];
    document.getElementById("edit-method").value=r.method||"現金";
  }
  document.getElementById("edit-overlay").classList.add("show");
}

function saveRecord(){
  if(!editingId) return;
  var records=getData(), idx=records.findIndex(function(x){return x.id===editingId;});
  if(idx===-1) return;
  records[idx].date=document.getElementById("edit-date").value;
  records[idx].item=document.getElementById("edit-item").value.trim();
  records[idx].price=parseFloat(document.getElementById("edit-price").value)||0;
  if(records[idx].type==="income"){
    records[idx].status=document.getElementById("edit-status").value;
  } else {
    records[idx].category=document.getElementById("edit-cat").value;
    records[idx].method=document.getElementById("edit-method").value;
  }
  saveData(records);
  saveRecord_firebase(records[idx]);
  document.getElementById("edit-overlay").classList.remove("show");
  editingId=null; renderRecords(); showToast("✓ 已更新！");
}

function deleteRecord(){
  if(!editingId) return;
  var records=getData().filter(function(x){return x.id!==editingId;});
  saveData(records); deleteRecord_firebase(editingId);
  document.getElementById("edit-overlay").classList.remove("show");
  editingId=null; renderRecords(); showToast("已刪除");
}

// 分類管理
var DEFAULT_EXPENSE_CATS=["飲食","交通","購物","玩樂","日常用品","固定支出"];
var DEFAULT_INCOME_CATS=["工作","生活費","兼職","獎金","其他"];

function getExpenseCats(){ try{ return JSON.parse(localStorage.getItem("expense_cats")||"null")||DEFAULT_EXPENSE_CATS.slice(); }catch(e){ return DEFAULT_EXPENSE_CATS.slice(); } }
function getIncomeCats(){ try{ return JSON.parse(localStorage.getItem("income_cats")||"null")||DEFAULT_INCOME_CATS.slice(); }catch(e){ return DEFAULT_INCOME_CATS.slice(); } }
function saveExpenseCats(cats){ localStorage.setItem("expense_cats",JSON.stringify(cats)); }
function saveIncomeCats(cats){ localStorage.setItem("income_cats",JSON.stringify(cats)); }

var currentCatTab="expense";
function openCatManager(){
  currentCatTab="expense";
  renderCatList();
  document.getElementById("cat-manager-overlay").classList.add("show");
}
function switchCatTab(tab){
  currentCatTab=tab;
  document.getElementById("cat-tab-expense").style.background=tab==="expense"?"#1565c0":"var(--surface)";
  document.getElementById("cat-tab-expense").style.color=tab==="expense"?"#fff":"var(--text2)";
  document.getElementById("cat-tab-expense").style.border=tab==="expense"?"none":"1.5px solid var(--border)";
  document.getElementById("cat-tab-income").style.background=tab==="income"?"#26a69a":"var(--surface)";
  document.getElementById("cat-tab-income").style.color=tab==="income"?"#fff":"var(--text2)";
  document.getElementById("cat-tab-income").style.border=tab==="income"?"none":"1.5px solid var(--border)";
  renderCatList();
}
function renderCatList(){
  var cats=currentCatTab==="expense"?getExpenseCats():getIncomeCats();
  var el=document.getElementById("cat-list-manage"); el.innerHTML="";
  cats.forEach(function(cat,i){
    var row=document.createElement("div"); row.style.cssText="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);";
    var name=document.createElement("span"); name.style.cssText="flex:1;font-size:15px;"; name.textContent=cat;
    var del=document.createElement("button"); del.style.cssText="background:var(--red-light);color:var(--red);border:none;border-radius:8px;padding:4px 10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;"; del.textContent="刪除";
    del.addEventListener("click",function(){
      if(cats.length<=1){showToast("至少保留一個分類");return;}
      cats.splice(i,1);
      if(currentCatTab==="expense") saveExpenseCats(cats); else saveIncomeCats(cats);
      renderCatList();
    });
    row.appendChild(name); row.appendChild(del); el.appendChild(row);
  });
}
function addCategory(){
  var inp=document.getElementById("cat-new-input"), val=inp.value.trim();
  if(!val){showToast("請輸入分類名稱");return;}
  var cats=currentCatTab==="expense"?getExpenseCats():getIncomeCats();
  if(cats.indexOf(val)!==-1){showToast("分類已存在");return;}
  cats.push(val);
  if(currentCatTab==="expense") saveExpenseCats(cats); else saveIncomeCats(cats);
  inp.value=""; renderCatList(); showToast("✓ 已新增");
}

var monthPickerTarget='stats';
function openMonthPicker(target){
  monthPickerTarget=target;
  var ym=target==='stats'?statsMonth:recMonth;
  var yr=parseInt(ym.slice(0,4)), mo=parseInt(ym.slice(5,7));
  var yearSel=document.getElementById('picker-year');
  var monSel=document.getElementById('picker-month');
  yearSel.innerHTML='';
  var curYear=new Date().getFullYear();
  for(var y=curYear-3;y<=curYear+1;y++){
    var opt=document.createElement('option'); opt.value=y; opt.textContent=y+'年';
    if(y===yr) opt.selected=true;
    yearSel.appendChild(opt);
  }
  monSel.innerHTML='';
  for(var m=1;m<=12;m++){
    var opt=document.createElement('option'); opt.value=String(m).padStart(2,'0'); opt.textContent=m+'月';
    if(m===mo) opt.selected=true;
    monSel.appendChild(opt);
  }
  document.getElementById('month-picker-overlay').classList.add('show');
}
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('month-picker-overlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
  document.getElementById('cat-manager-overlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
  document.getElementById('picker-confirm').addEventListener('click',function(){
    var y=document.getElementById('picker-year').value;
    var m=document.getElementById('picker-month').value;
    var ym=y+'-'+m;
    if(monthPickerTarget==='stats'){statsMonth=ym;renderStats();}
    else{recMonth=ym;renderRecords();}
    document.getElementById('month-picker-overlay').classList.remove('show');
  });
});

function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2000);}

// 初始化
var today=getToday();
statsMonth=today.slice(0,7);
recMonth=today.slice(0,7);

window._onFirebaseReady = function(){
  qaReset();
};
